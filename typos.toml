[default]
extend-ignore-re = [
    # Test files intentionally use truncated strings to simulate partial writes
    "Truncat",
    # Base64-encoded JWT tokens contain fragments that look like typos
    "eyJ[A-Za-z0-9+/=._-]+",
    # Prompt-injection test payloads embed a zero-width space (U+200B) inside
    # tokens like "ig​nore" to bypass naive keyword filters. typos splits
    # on the ZWSP and flags the trailing fragment ("nore") as a misspelling.
    # Mask any alphanumeric run that contains an embedded ZWSP so fixtures
    # stay intact without globally allowlisting the fragment.
    "[A-Za-z]+​[A-Za-z]+",
]

[default.extend-words]
# Variable names and abbreviations in code
ba = "ba"            # ba_table = Budget & Approval table (manifest_cmd.py)
nd = "nd"            # nd = number of diffs (benchmarks/run_benchmark.py)
opps = "opps"        # opps = opportunities (test_evolution_e2e.py, test_evolution_loop.py)
ded = "ded"          # injection_ded = injection deduction (memory_sanitizer.py)
ehr = "ehr"          # Electronic Health Record (HIPAA compliance)
rto = "rto"          # Recovery Time Objective (compliance/DR)
RTO = "RTO"          # Recovery Time Objective (compliance/DR, acronym)
mis = "mis"          # false positive on partial words
fo = "fo"            # fo = fan_out (test_complexity_correlation.py)
thr = "thr"          # thr = threshold (scripts/mutmut_critical.py)
Aktive = "Aktive"    # correct German word for "Active" (i18n.py)

# Technical terms used consistently in the codebase
unparseable = "unparseable"
Unparseable = "Unparseable"
empted = "empted"    # `pre-empted` (past tense of pre-empt); typos splits on `-`
noteable = "noteable" # GitLab webhook field name (`noteable_type`, `noteable_id`)
Noteable = "Noteable" # GitLab webhook field name, capitalised form
optin = "optin"      # compound abbreviation for "opt-in"; used in test filenames
Optin = "Optin"      # capitalised form for class names / docs

# Proper nouns and product names
Hashi = "Hashi"      # HashiCorp
certifi = "certifi"  # Python CA certificate package

[default.extend-identifiers]
# Truncated benchmark task names (generated data)
architec = "architec"

[files]
extend-exclude = [
    # Binary assets (typos cannot meaningfully check filenames of binaries)
    "docs/assets/*.png",
    # Generated benchmark results contain truncated task names
    "benchmarks/results/*.json",
    # Translated READMEs — typos has only an English dictionary, every
    # non-English word would be a false positive.
    "docs/i18n/**",
    # Lineage demo fixtures are 100% deterministic hex content (sha256 hashes,
    # JWS base64url, Ed25519 PEM). The scanner reads three-char hex slices like
    # "abd"/"caf"/"dbe" as misspellings of and/calf/be. Path-exclude the entire
    # fixtures tree; review still applies to the human-authored README/Makefile.
    "examples/lineage/*/fixtures/**",
    "examples/lineage/*/expected-pack.zip",
    # Vite-built SPA bundle — minified JS / sourcemaps mangle identifiers to
    # 1–2 chars (``ue``, ``ot``, ``Iy``, ``Archtype``, etc.) that trigger
    # thousands of false-positive typo errors and bury real findings. Human-
    # authored React/TS sources under ``web/src/`` stay in scope.
    "src/bernstein/gui/static/**",
    # Auto-heal typos helper -- intentionally contains a prose-typo
    # denylist (`recieve`, `occured`, etc.) as data so it can reject
    # those tokens at allowlist-time. The matching unit tests also
    # carry the strings. Scanning these would create a circular
    # contradiction (the scanner sees its own denylist as a typo).
    "scripts/auto_heal_typos.py",
    "tests/unit/test_auto_heal_typos.py",
]

[type.md]
extend-words = { PN = "PN" }  # "PNGs" in markdown docs
