version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    labels:
      - "dependencies"
    groups:
      # Security-critical deps get a dedicated group so a CVE patch
      # doesn't hide inside a bundle of feature bumps. Each entry must
      # also appear in pyproject.toml :: dependencies (production) or
      # dev (CI hardening).
      security:
        applies-to: security-updates
        patterns:
          - "cryptography"
          - "signxml"
          - "defusedxml"
          - "fastapi"
          - "starlette"
          - "uvicorn"
          - "httpx"
          - "pyjwt"
          - "pyyaml"
          - "lxml"
          - "requests"
          - "urllib3"
          - "bandit"
          - "pip-audit"
        # semgrep is installed out-of-tree via `uv tool install semgrep`
        # (see .github/workflows/ci.yml + docs/contributing/testing.md);
        # not a pip dep so dependabot can't manage it from here.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
