name: Auto-release

# Triggers after CI passes on main — bumps patch version and publishes
# Only releases when meaningful source/test/template files changed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Sibling alert job — fires when the triggering CI run did NOT succeed
  # (cancelled / failure / timed_out / action_required). Without this,
  # auto-release silently skipped the v2.0.0 publish because the gate
  # job below short-circuits on anything other than 'success' (#1273).
  # 'skipped' is intentional and stays quiet.
  alert-on-stale-release-trigger:
    name: Alert on stale release trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      contains(fromJSON('["failure","cancelled","timed_out","action_required"]'),
        github.event.workflow_run.conclusion)
    permissions:
      contents: read
      issues: write
    steps:
      - name: Log the skipped trigger
        env:
          STATUS: ${{ github.event.workflow_run.conclusion }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "::error::release skipped — CI conclusion was ${STATUS} on ${SHA}"

      - name: Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ github.event.workflow_run.conclusion }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          HTML_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured; skipping."
            exit 0
          fi
          SHORT_SHA="${SHA:0:7}"
          TEXT="📦 auto-release skipped on ${BRANCH}
          CI conclusion: ${STATUS}
          Commit: ${SHORT_SHA}
          ${HTML_URL}"
          KEYBOARD='{"inline_keyboard":[[{"text":"🔄 View Run","url":"'"${HTML_URL}"'"}]]}'
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${TEXT}\",\"reply_markup\":${KEYBOARD}}" \
            || echo "Telegram notification failed"

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ github.event.workflow_run.conclusion }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          HTML_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          TITLE="auto-release skipped on \`${SHORT_SHA}\` (conclusion: ${STATUS})"
          BODY=$(printf 'CI conclusion: **%s**\n\nCommit: %s\nRun: %s\n\nThis issue was opened automatically by `auto-release.yml :: alert-on-stale-release-trigger`. See #1273 for the root cause.\n' \
            "${STATUS}" "${SHA}" "${HTML_URL}")

          # Idempotent: find an existing open issue with the same title
          # (same SHA + conclusion) and just append a comment instead of
          # opening duplicates.
          EXISTING=$(gh issue list --repo "${REPO}" --state open \
            --search "in:title auto-release skipped ${SHORT_SHA}" \
            --json number,title \
            --jq ".[] | select(.title == \"${TITLE}\") | .number" \
            | head -1)

          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --repo "${REPO}" \
              --body "Repeat trigger — same commit, same conclusion. Run: ${HTML_URL}"
          else
            gh issue create --repo "${REPO}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label "ci,release-drift" || \
            gh issue create --repo "${REPO}" \
              --title "${TITLE}" \
              --body "${BODY}"
          fi

  gate:
    name: Release gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - name: Check for meaningful changes
        id: decide
        run: |
          # Skip bot commits (prevents release loop)
          AUTHOR=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }} \
            --jq '.author.login // ""')
          if [ "$AUTHOR" = "bernstein-orchestrator[bot]" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: bot commit"
            exit 0
          fi

          # Find latest release tag
          PREV_TAG=$(gh api repos/${{ github.repository }}/releases/latest \
            --jq '.tag_name' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No previous release — proceeding"
            exit 0
          fi

          # Count changed files that matter for a release:
          #   src/         — Python source code
          #   tests/       — test suite
          #   templates/   — role/prompt templates
          #   scripts/     — build/test scripts
          #   packaging/   — npm/docker packaging
          #   infra/       — infrastructure configs
          #   sdk/         — SDK code
          #   services/    — service code
          #   Dockerfile*  — container builds
          #   requirements*— dependency pins
          #   pyproject.toml — version, deps, config
          CHANGED=$(gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${{ github.event.workflow_run.head_sha }}" \
            --jq '[.files[].filename | select(
              test("^src/") or
              test("^tests/") or
              test("^templates/") or
              test("^scripts/") or
              test("^packaging/") or
              test("^infra/") or
              test("^sdk/") or
              test("^services/") or
              test("^Dockerfile") or
              test("^requirements") or
              test("^pyproject\\.toml$")
            )] | length')

          echo "Meaningful files changed since $PREV_TAG: ${CHANGED:-0}"
          if [ "${CHANGED:-0}" = "0" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No source/test/template changes — skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    name: Patch release
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Binding to the "pypi" environment makes every successful publish
    # create a green deployment marker (visible in the repo sidebar
    # Deployments view). Without this, recent v1.10.x publishes succeed
    # but the sidebar still shows whatever the last environment-bound
    # run left behind — which was a stale failure from April 26.
    environment:
      name: pypi
      url: https://pypi.org/p/bernstein/
    permissions:
      contents: write
      packages: write
      # Sigstore keyless OIDC (Fulcio cert + Rekor log entry) for the
      # build-provenance attestation step. Closes the FINOS AIGF
      # CTRL-MODEL-SUPPLY-CHAIN release-artefact gap. See
      # docs/compliance/finos-aigf-mapping.md.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@00714ea9dc27830a1586fe47ef7ad28e4fd5db45 # v7
        with:
          enable-cache: true

      # Read current version
      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"

      # Skip if this version is already tagged
      - name: Check tag
        id: check
        run: |
          if git tag -l "v${{ steps.ver.outputs.current }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # Tag-already-exists path: no-op success, not auto-bump.
      #
      # Previous logic tried to open an auto-merge bump PR via `gh pr create`.
      # The `sipyourdrink-ltd` org blocks GitHub Actions from creating pull
      # requests (`GraphQL: GitHub Actions is not permitted to create or
      # approve pull requests`), so every CI run on main after a release tag
      # has shipped failed at this step — painting the pypi deployment red
      # weekly even when nothing was wrong with the code.
      #
      # New behaviour: when the current pyproject.toml version is already
      # tagged, exit cleanly with a notice. The operator can ship the next
      # release by manually bumping `pyproject.toml` in any PR (the bump
      # commit itself triggers a fresh CI → auto-release run that finds an
      # untagged version and proceeds to tag + build + publish).
      - name: No-op when current version is already tagged
        if: steps.check.outputs.exists == 'true'
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.ver.outputs.current }}"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "::notice::v${{ steps.ver.outputs.current }} is already tagged. Skipping auto-release. To ship the next patch, manually bump pyproject.toml to v${NEXT} (or higher) in any PR — auto-release will pick it up on merge."
          echo "version=${{ steps.ver.outputs.current }}" >> "$GITHUB_OUTPUT"
          echo "deferred=true" >> "$GITHUB_OUTPUT"

      # Final version (bumped or current). When the bump was deferred to a
      # PR, every subsequent step short-circuits via the ``deferred`` output
      # below — the actual tag + publish will happen on the next workflow
      # run after the PR's CI passes and auto-merge fires.
      - name: Set version
        id: final
        run: |
          if [ "${{ steps.bump.outputs.deferred }}" = "true" ]; then
            echo "::notice::Auto-release deferred — bump PR for v${{ steps.bump.outputs.version }} will trigger the publish run on merge."
            echo "deferred=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deferred=false" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "version=${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.ver.outputs.current }}" >> "$GITHUB_OUTPUT"
          fi

      # Tag + build + publish — all skipped when the bump was deferred to a PR.
      - name: Tag
        if: steps.final.outputs.deferred != 'true'
        run: |
          git tag "v${{ steps.final.outputs.version }}"
          git push origin "v${{ steps.final.outputs.version }}"

      - name: Build
        if: steps.final.outputs.deferred != 'true'
        run: uv build

      # Sigstore build-provenance attestation. Closes the FINOS AIGF
      # CTRL-MODEL-SUPPLY-CHAIN release-artefact gap previously deferred
      # in docs/compliance/finos-aigf-mapping.md. Every wheel + sdist
      # gets a SLSA-3 attestation, recorded in the public Rekor log,
      # verifiable via:
      #   gh attestation verify <file> --owner sipyourdrink-ltd
      # Runs BEFORE the PyPI publish so the transparency-log entry
      # exists before any consumer can pip-install the artefact.
      - name: Attest build provenance (Sigstore)
        if: steps.final.outputs.deferred != 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        if: steps.final.outputs.deferred != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

      - name: GitHub Release
        if: steps.final.outputs.deferred != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.final.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          # Delete any pre-existing *draft* release with the same tag
          # (release-drafter often has one queued). Skip if it's a real
          # published release — never touch cleanup-tag on a real tag.
          IS_DRAFT=$(gh release view "v${VERSION}" --json isDraft --jq '.isDraft' 2>/dev/null || echo "none")
          if [ "$IS_DRAFT" = "true" ]; then
            gh release delete "v${VERSION}" --yes
          fi

          # Build human-readable notes from conventional-commit messages
          # since the previous release tag. Commits are grouped by prefix
          # (feat/fix/refactor/perf/docs/ci/chore/test); their subject
          # lines — not raw hashes — become bullet points.
          PREV_TAG=$(git describe --tags --abbrev=0 "HEAD^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --no-merges --pretty='%s' -20 > /tmp/commits.txt
          else
            git log --no-merges --pretty='%s' "${PREV_TAG}..HEAD" > /tmp/commits.txt
          fi

          python3 scripts/format_release_notes.py \
            --version "$VERSION" \
            --prev-tag "$PREV_TAG" \
            --repo "$REPO" \
            --commits /tmp/commits.txt \
            > RELEASE_NOTES.md

          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md

      # --- npm wrapper ---
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.final.outputs.deferred != 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # The npm publish is intentionally fire-and-forget. After the
      # repo transfer to sipyourdrink-ltd, NPM_TOKEN does not have
      # permission to publish bernstein-orchestrator (the package is
      # owned by alexchernysh on npm). Until a fresh token with
      # publish rights is provisioned and stored as NPM_TOKEN, we
      # absorb the failure here so it does not poison the release
      # job's deployment status. PyPI / GitHub Release / GHCR are
      # unaffected — they ran in earlier steps.
      - name: Publish npm wrapper
        if: steps.final.outputs.deferred != 'true'
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packaging/npm
          npm version "${{ steps.final.outputs.version }}" --no-git-tag-version
          if ! npm publish --access public; then
            echo "::warning::npm publish failed for v${{ steps.final.outputs.version }} — continuing release. Likely cause: NPM_TOKEN needs to be re-issued with publish rights for bernstein-orchestrator. PyPI/GHCR/GitHub Release already succeeded in earlier steps."
          fi

      # --- Docker / OCI ---
      - name: Log in to GitHub Container Registry
        if: steps.final.outputs.deferred != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: steps.final.outputs.deferred != 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build and push Docker image
        if: steps.final.outputs.deferred != 'true'
        continue-on-error: true
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.final.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
