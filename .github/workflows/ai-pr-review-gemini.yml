name: AI PR Review (Gemini)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-gemini-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gemini-review:
    name: Gemini review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai')
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Check for API key
        id: check
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "GEMINI_API_KEY not configured; skipping Gemini review."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        if: steps.check.outputs.skip == 'false'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Generate AI review
        if: steps.check.outputs.skip == 'false'
        id: review
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff --unified=3 origin/${{ github.base_ref }}...HEAD | head -c 80000)

          PROMPT="You are a senior Python library maintainer. Review the following PR diff for Bernstein (Python 3.12+ multi-agent CLI orchestrator). Focus on correctness, backward compatibility, security, and missing tests. Return a concise markdown report with sections: Summary, Risk Assessment, and Actionable Recommendations (max 5 items).

          Diff:
          $DIFF"

          # Use Gemini REST API directly (the CLI requires OAuth, not API keys)
          PAYLOAD=$(jq -n --arg prompt "$PROMPT" '{
            "contents": [{"parts": [{"text": $prompt}]}],
            "generationConfig": {"temperature": 0.2, "maxOutputTokens": 2048}
          }')

          # Gemini's free tier returns transient 5xx and 429s under load. Retry
          # with exponential backoff on those; fail fast on auth/permission 4xx
          # so we don't burn minutes on a misconfigured key.
          HTTP_CODE=000
          BODY_RAW=""
          for attempt in 1 2 3 4 5; do
            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" 2>/dev/null) || RESPONSE=$'\n000'

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY_RAW=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi

            case "$HTTP_CODE" in
              429|500|502|503|504|000)
                BACKOFF=$((2 ** attempt))
                echo "Gemini API HTTP $HTTP_CODE on attempt $attempt — retrying in ${BACKOFF}s"
                sleep "$BACKOFF"
                ;;
              *)
                echo "Gemini API HTTP $HTTP_CODE — non-retryable, giving up"
                break
                ;;
            esac
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Gemini API returned HTTP $HTTP_CODE after retries"
            BODY="Gemini review could not be generated (HTTP $HTTP_CODE after 5 attempts)."
          else
            BODY=$(echo "$BODY_RAW" | jq -r '.candidates[0].content.parts[0].text // "Review unavailable."')
          fi

          {
            echo "body<<REVIEW_EOF"
            echo "$BODY"
            echo "REVIEW_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post review comment
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REVIEW_BODY: ${{ steps.review.outputs.body }}
        with:
          script: |
            const marker = '<!-- ai-review-gemini -->';
            const body = `${marker}\n### AI Review (Gemini)\n\n${process.env.REVIEW_BODY}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
