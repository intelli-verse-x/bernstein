name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip on PRs from forks: ``pull_request`` events from external
    # repositories receive a read-only ``GITHUB_TOKEN`` regardless of
    # the workflow-level ``permissions:`` block, so the action fails
    # with "Resource not accessible by integration" when it tries to
    # create or update the draft release. The draft will refresh on
    # the next push to main after the fork PR merges.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7
        with:
          # On PRs, github.ref is refs/pull/N/merge which GitHub rejects
          # as a release target. Always point to main.
          commitish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
