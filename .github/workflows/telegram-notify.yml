name: Telegram CI Notifications

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: telegram-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  notify:
    # Notify on anything that isn't 'success' (so cancelled/timed_out/
    # action_required runs no longer disappear silently — see #1273).
    # 'skipped' is intentional and stays quiet.
    if: >-
      github.event.workflow_run.conclusion != 'success'
      && github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send Telegram notification with action buttons
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ github.event.workflow_run.conclusion }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          HTML_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured; skipping."
            exit 0
          fi

          SHORT_SHA="${SHA:0:7}"
          # Pick an icon that hints at the conclusion so the operator can
          # tell at a glance whether CI broke, got cancelled, or timed out.
          case "${STATUS}" in
            failure)          ICON="❌" ;;
            cancelled)        ICON="🚫" ;;
            timed_out)        ICON="⏱️" ;;
            action_required)  ICON="⚠️" ;;
            *)                ICON="❓" ;;
          esac
          TITLE="${ICON} CI ${STATUS} on ${BRANCH}"

          TEXT="${TITLE}
          Conclusion: ${STATUS}
          Commit: ${SHORT_SHA}
          ${HTML_URL}"

          # Send with inline keyboard for quick actions
          KEYBOARD='{"inline_keyboard":[[{"text":"🔄 View Run","url":"'"${HTML_URL}"'"},{"text":"📋 Rerun","url":"https://github.com/'"${REPO}"'/actions/runs/'"${RUN_ID}"'/rerun"}]]}'

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${TEXT}\",\"reply_markup\":${KEYBOARD}}" \
            || echo "Telegram notification failed"
